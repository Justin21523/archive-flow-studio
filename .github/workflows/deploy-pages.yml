name: Deploy Browser Demo to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - name: Verify
        run: ./scripts/verify.sh

      - name: Publish Browser demo
        run: ./scripts/publish-browser.sh

      - name: Prepare GitHub Pages artifact
        run: ./scripts/prepare-pages-artifact.sh

      - name: Configure Pages
        uses: actions/configure-pages@v5

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: src/ArchiveFlow.Browser/bin/Release/net10.0-browser/publish/wwwroot

      - name: Deploy Pages
        id: deployment
        uses: actions/deploy-pages@v4
